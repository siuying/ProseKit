name: CompatibilityExample
options:
  bundleIdPrefix: com.siuying
packages:
  Prose:
    path: ../..
  SwiftYrs:
    path: ../../../SwiftYrs
targets:
  CompatibilityExample:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Shared
    dependencies:
      - package: Prose
        product: ProseEditor
      - package: Prose
        product: ProseModel
      - package: Prose
        product: ProseKitYjs
      - package: SwiftYrs
        product: SwiftYrsHocuspocus
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.siuying.CompatibilityExample
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
  CompatibilityExampleMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Shared
    dependencies:
      - package: Prose
        product: ProseEditor
      - package: Prose
        product: ProseModel
      - package: Prose
        product: ProseKitYjs
      - package: SwiftYrs
        product: SwiftYrsHocuspocus
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.siuying.CompatibilityExampleMac
schemes:
  CompatibilityExample:
    build:
      targets:
        CompatibilityExample: all
    run:
      config: Debug
  CompatibilityExampleMac:
    build:
      targets:
        CompatibilityExampleMac: all
    run:
      config: Debug
